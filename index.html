<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wavecast — Podcast Explorer</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">

      <!-- Top Navigation Bar -->
      <header class="topbar" id="topbar">
        <div class="topbar-inner">
          <div class="topbar-row">
            <div class="brand">
              <div class="brand-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
                  <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                  <line x1="12" y1="19" x2="12" y2="22"/>
                </svg>
              </div>
              <span class="brand-name">Wave<span class="brand-accent">cast</span></span>
            </div>
            <div class="topbar-actions">
              <span class="course-badge">SWE 221 · Group 17</span>
              <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle dark mode">
                <svg class="sun-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <svg class="moon-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="search-bar">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input
              type="text"
              id="searchInput"
              class="search-input"
              placeholder="Search podcasts, topics, hosts..."
              autocomplete="off"
            />
            <button class="search-btn" id="searchBtn">Search</button>
          </div>

          <nav class="tabs" role="tablist">
            <button class="tab active" role="tab" data-tab="browse" aria-selected="true">Browse</button>
            <button class="tab" role="tab" data-tab="trending" aria-selected="false">Trending</button>
            <button class="tab" role="tab" data-tab="saved" aria-selected="false">Saved</button>
          </nav>
        </div>
      </header>

      <!-- Browse View -->
      <main id="browseView" class="view active">

        <section class="section" aria-label="Topics">
          <p class="section-label">Pick a topic</p>
          <div class="pill-row" id="pillRow" role="group" aria-label="Topic filters"></div>
        </section>

        <section class="section" aria-label="Search results">
          <div class="results-header">
            <p class="section-label" id="resultsLabel">Top results</p>
            <span class="results-count" id="resultsCount"></span>
          </div>
          <div id="resultsArea" aria-live="polite"></div>
          <div class="load-more-container" id="loadMoreContainer" style="display: none;">
            <button class="load-more-btn" id="loadMoreBtn">Load More</button>
          </div>
        </section>

      </main>

      <!-- Detail View -->
      <div id="detailView" class="view" aria-label="Podcast detail">
        <div class="detail-header">
          <button class="back-btn" id="backBtn" aria-label="Go back to results">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
            Back
          </button>
          <div class="detail-pod-row">
            <div class="detail-art" id="dArt"></div>
            <div class="detail-info">
              <h1 class="detail-title" id="dTitle"></h1>
              <p class="detail-author" id="dAuthor"></p>
              <div class="detail-rating" id="dRating"></div>
              <p class="detail-desc" id="dDesc"></p>
              <div class="detail-actions">
                <button class="action-btn primary" id="dSubscribe">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                    <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
                  </svg>
                  Subscribe
                </button>
                <button class="action-btn" id="saveBtn">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                  </svg>
                  Save
                </button>
                <button class="action-btn" id="dShare">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                  </svg>
                  Share
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="episodes-section">
          <p class="section-label">Episodes</p>
          <div id="episodesArea" aria-live="polite"></div>
        </div>
      </div>

      <!-- Saved View -->
      <div id="savedView" class="view" aria-label="Saved podcasts">
        <div class="section">
          <p class="section-label">Saved podcasts</p>
          <div id="savedArea" aria-live="polite"></div>
        </div>
      </div>

      <!-- Sticky Bottom Audio Player -->
      <div id="audioPlayer" class="audio-player">
        <div class="player-inner">
          <div class="player-track-info">
            <p class="player-title" id="playerTitle">Select an episode to play</p>
            <p class="player-subtitle" id="playerSubtitle">Wavecast Player</p>
          </div>
          <div class="player-controls">
            <button class="player-btn" id="playerPlayPause" aria-label="Play/Pause">
              <svg id="playIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5 3 19 12 5 21 5 3"/>
              </svg>
              <svg id="pauseIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
              </svg>
            </button>
            <button class="player-btn close" id="playerClose" aria-label="Close player">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="player-progress-bar">
          <div id="playerProgress" class="player-progress"></div>
        </div>
      </div>

    </div>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/render.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
